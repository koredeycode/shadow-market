version: '3.8'

services:
  # ==============================================
  # Midnight Network Services
  # ==============================================

  midnight-node:
    image: midnightntwrk/midnight-node:0.21.0
    container_name: shadow-midnight-node
    ports:
      - '9944:9944'
    environment:
      CFG_PRESET: 'dev'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9944/health']
      interval: 2s
      timeout: 5s
      retries: 20
    networks:
      - shadow-network

  midnight-indexer:
    image: midnightntwrk/indexer-standalone:3.1.0
    container_name: shadow-midnight-indexer
    ports:
      - '8088:8088'
    environment:
      APP__APPLICATION__NETWORK_ID: 'undeployed'
      APP__INFRA__NODE__URL: 'ws://midnight-node:9944'
      APP__INFRA__SECRET: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
    depends_on:
      midnight-node:
        condition: service_healthy
    networks:
      - shadow-network

  midnight-proof-server:
    image: midnightntwrk/proof-server:7.0.0
    container_name: shadow-midnight-proof-server
    ports:
      - '6300:6300'
    environment:
      LOG_LEVEL: 'info'
    networks:
      - shadow-network

  # ==============================================
  # Backend Services (Using Local Instances)
  # ==============================================
  # PostgreSQL and Redis services are commented out because
  # local instances are already running on the host machine.
  #
  # Uncomment these if you want to use containerized services instead:
  #
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: shadow-postgres
  #   restart: unless-stopped
  #   ports:
  #     - '5432:5432'
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: shadowmarket
  #     POSTGRES_HOST_AUTH_METHOD: trust
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ['CMD-SHELL', 'pg_isready -U postgres']
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - shadow-network
  #
  # redis:
  #   image: redis:7-alpine
  #   container_name: shadow-redis
  #   restart: unless-stopped
  #   ports:
  #     - '6379:6379'
  #   command: redis-server --appendonly yes
  #   volumes:
  #     - redis-data:/data
  #   healthcheck:
  #     test: ['CMD', 'redis-cli', 'ping']
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5
  #   networks:
  #     - shadow-network

networks:
  shadow-network:
    driver: bridge

# Volumes are commented out since we're using local PostgreSQL and Redis
# Uncomment if you enable the containerized services:
#
# volumes:
#   postgres-data:
#     driver: local
#   redis-data:
#     driver: local
