version: '3.8'

services:
  # ==============================================
  # Midnight Network Services (Local Stack)
  # ==============================================
  midnight-node:
    image: midnightntwrk/midnight-node:0.22.3
    container_name: shadow-midnight-node
    ports:
      - '9944:9944'
    environment:
      CFG_PRESET: 'dev'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9944/health']
      interval: 2s
      timeout: 5s
      retries: 20
    networks:
      - shadow-network

  midnight-indexer:
    image: midnightntwrk/indexer-standalone:4.0.1
    container_name: shadow-midnight-indexer
    ports:
      - '8088:8088'
    environment:
      APP__APPLICATION__NETWORK_ID: 'undeployed'
      APP__INFRA__NODE__URL: 'ws://midnight-node:9944'
      APP__INFRA__SECRET: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
    depends_on:
      midnight-node:
        condition: service_healthy
    networks:
      - shadow-network

  midnight-proof-server:
    image: midnightntwrk/proof-server:8.0.3
    container_name: shadow-midnight-proof-server
    ports:
      - '6300:6300'
    environment:
      LOG_LEVEL: 'info'
    networks:
      - shadow-network

  # ==============================================
  # Local Environment Infrastructure (Port 5434)
  # ==============================================
  postgres-local:
    image: postgres:16-alpine
    container_name: shadow-postgres-local
    restart: unless-stopped
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shadowmarket_undeployed
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shadow-network

  # ==============================================
  # Preview Environment Infrastructure (Port 5435)
  # ==============================================
  postgres-preview:
    image: postgres:16-alpine
    container_name: shadow-postgres-preview
    restart: unless-stopped
    ports:
      - '5435:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shadowmarket_preview
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-preview-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shadow-network

  # ==============================================
  # Prepod Environment Infrastructure (Port 5436)
  # ==============================================
  postgres-prepod:
    image: postgres:16-alpine
    container_name: shadow-postgres-prepod
    restart: unless-stopped
    ports:
      - '5436:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shadowmarket_prepod
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-prepod-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shadow-network

networks:
  shadow-network:
    driver: bridge

volumes:
  postgres-local-data:
    driver: local
  postgres-preview-data:
    driver: local
  postgres-prepod-data:
    driver: local
